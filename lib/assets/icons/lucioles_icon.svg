<svg width="300" height="280" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">

  <!-- Hexagone -->
  <polygon points="150,14 256,72 256,208 150,266 44,208 44,72"
    fill="#1a1a3a" stroke="#f5c842" stroke-width="0.8" stroke-opacity="0.15"/>

  <!-- Fils rayonnants du centre vers chaque luciole -->
  <line x1="150" y1="132" x2="150" y2="68" stroke="#f5c842" stroke-width="1.1" stroke-opacity="0.45"/>
  <line x1="158" y1="138" x2="214" y2="106" stroke="#f5c842" stroke-width="1.1" stroke-opacity="0.40"/>
  <line x1="157" y1="147" x2="204" y2="188" stroke="#f5c842" stroke-width="1.1" stroke-opacity="0.40"/>
  <line x1="150" y1="151" x2="138" y2="208" stroke="#f5c842" stroke-width="1.1" stroke-opacity="0.38"/>
  <line x1="142" y1="146" x2="96" y2="178" stroke="#f5c842" stroke-width="1.1" stroke-opacity="0.40"/>
  <line x1="143" y1="137" x2="100" y2="102" stroke="#f5c842" stroke-width="1.1" stroke-opacity="0.40"/>

  <!-- Luciole centrale -->
  <circle cx="150" cy="140" r="16" fill="#f5c842"/>
  <circle cx="150" cy="140" r="26" fill="#f5c842" opacity="0.18"/>
  <circle cx="150" cy="140" r="36" fill="#f5c842" opacity="0.07"/>

  <!-- haut -->
  <circle cx="150" cy="64" r="9" fill="#f5c842"/>
  <circle cx="150" cy="64" r="16" fill="#f5c842" opacity="0.16"/>

  <!-- droite haute -->
  <circle cx="216" cy="102" r="8" fill="#f5c842" opacity="0.9"/>
  <circle cx="216" cy="102" r="14" fill="#f5c842" opacity="0.14"/>

  <!-- droite basse -->
  <circle cx="206" cy="190" r="10" fill="#f5c842"/>
  <circle cx="206" cy="190" r="17" fill="#f5c842" opacity="0.14"/>

  <!-- bas -->
  <circle cx="136" cy="210" r="7.5" fill="#f5c842" opacity="0.85"/>
  <circle cx="136" cy="210" r="13" fill="#f5c842" opacity="0.13"/>

  <!-- gauche basse -->
  <circle cx="94" cy="180" r="8" fill="#f5c842" opacity="0.9"/>
  <circle cx="94" cy="180" r="14" fill="#f5c842" opacity="0.15"/>

  <!-- gauche haute — teinte verte douce -->
  <circle cx="98" cy="100" r="7" fill="#a8e6a3" opacity="0.9"/>
  <circle cx="98" cy="100" r="13" fill="#a8e6a3" opacity="0.15"/>

</svg>
